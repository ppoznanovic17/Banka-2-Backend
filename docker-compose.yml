services:
  db:
    image: mysql:8.0
    container_name: banka2_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: banka2
      MYSQL_USER: banka2user
      MYSQL_PASSWORD: banka2pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: banka2_adminer
    ports:
      - "9001:8080"

  # Spring Boot backend
  backend:
    build: ./banka2_bek
    container_name: banka2_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/banka2
      SPRING_DATASOURCE_USERNAME: banka2user
      SPRING_DATASOURCE_PASSWORD: banka2pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
